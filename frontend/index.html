<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecomendAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>RecomendAI</h1>
            <p>Digite 3 filmes que você AMA e descubra suas próximas maratonas!</p>
        </header>

        <div class="form-section">
            <form id="movieForm">
                <input type="hidden" name="user_id" value="9999">

                <div class="movie-input-group">
                    <label for="movie1">1º Filme Favorito</label>
                    <div class="autocomplete-container">
                        <input type="text" id="movie1" name="movie_title_1" placeholder="Comece a digitar o nome do filme..." autocomplete="off" required>
                        <div class="autocomplete-dropdown" id="dropdown1"></div>
                        <input type="hidden" name="movie_id_1" id="movie_id_1">
                        <input type="hidden" name="rating_1" value="5">
                    </div>
                </div>

                <div class="movie-input-group">
                    <label for="movie2">2º Filme Favorito</label>
                    <div class="autocomplete-container">
                        <input type="text" id="movie2" name="movie_title_2" placeholder="Comece a digitar o nome do filme..." autocomplete="off" required>
                        <div class="autocomplete-dropdown" id="dropdown2"></div>
                        <input type="hidden" name="movie_id_2" id="movie_id_2">
                        <input type="hidden" name="rating_2" value="5"> 
                    </div>
                </div>

                <div class="movie-input-group">
                    <label for="movie3">3º Filme Favorito</label>
                    <div class="autocomplete-container">
                        <input type="text" id="movie3" name="movie_title_3" placeholder="Comece a digitar o nome do filme..." autocomplete="off" required>
                        <div class="autocomplete-dropdown" id="dropdown3"></div>
                        <input type="hidden" name="movie_id_3" id="movie_id_3">
                        <input type="hidden" name="rating_3" value="5">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    Descubra Seus Próximos Filmes!
                </button>
            </form>
        </div>

        <!-- ========== SEÇÃO DE EXPLORAR CATÁLOGO ========== -->
        <div class="catalog-section">
            <div class="catalog-header">
                <h2 class="catalog-title">🎬 Explorar Catálogo</h2>
                <p class="catalog-subtitle">Pesquise qualquer filme do nosso acervo</p>
            </div>
            <div class="catalog-search-wrapper">
                <span class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </span>
                <input
                    type="text"
                    id="catalogSearch"
                    class="catalog-search-input"
                    placeholder="Pesquisar filme no catálogo..."
                    autocomplete="off"
                >
                <button class="catalog-clear-btn" id="catalogClearBtn" title="Limpar pesquisa">✕</button>
            </div>

            <div class="genre-pills-wrapper" id="genrePills">
                <!-- Pills gerados dinamicamente pelo JS -->
            </div>

            <div id="catalogStatus" class="catalog-status"></div>

            <div class="catalog-scroll-area" id="catalogResults">
                <div class="catalog-placeholder">
                    <span class="catalog-placeholder-icon">⏳</span>
                    <p>Carregando filmes...</p>
                </div>
            </div>
        </div>
        <!-- ========== FIM EXPLORAR CATÁLOGO ========== -->

        <div id="results" class="results-section" style="display: none;">
            <h2>📽️ Suas Recomendações Personalizadas</h2>
            <div class="movies-grid" id="moviesGrid">
            </div>
        </div>
    </div>

    <script>
        let moviesList = [];
        let autocompleteTimeout;
        let catalogSearchTimeout;

        async function loadMovies() {
            try {
                const response = await fetch('/get_movies');
                const movies = await response.json();
                moviesList = movies;
            } catch (error) {
                console.error('Erro ao carregar filmes:', error);
            }
        }

        function setupAutocomplete(inputId, dropdownId, hiddenId) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            const hiddenInput = document.getElementById(hiddenId);

            input.addEventListener('input', function() {
                clearTimeout(autocompleteTimeout);
                
                if (this.value.length < 2) {
                    dropdown.innerHTML = '';
                    dropdown.style.display = 'none';
                    return;
                }

                autocompleteTimeout = setTimeout(() => {
                    const searchTerm = this.value.toLowerCase();
                    const filteredMovies = moviesList.filter(movie => 
                        movie.title.toLowerCase().includes(searchTerm)
                    ).slice(0, 8);

                    if (filteredMovies.length > 0) {
                        dropdown.innerHTML = '';
                        filteredMovies.forEach(movie => {
                            const div = document.createElement('div');
                            div.className = 'autocomplete-item';
                            div.textContent = movie.title;
                            div.addEventListener('click', function() {
                                input.value = movie.title;
                                hiddenInput.value = movie.movie_id;
                                dropdown.innerHTML = '';
                                dropdown.style.display = 'none';
                            });
                            dropdown.appendChild(div);
                        });
                        dropdown.style.display = 'block';
                    } else {
                        dropdown.innerHTML = '<div class="autocomplete-item">Nenhum filme encontrado</div>';
                        dropdown.style.display = 'block';
                    }
                }, 300);
            });

            document.addEventListener('click', function(e) {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.style.display = 'none';
                }
            });
        }

        function initAutocompletes() {
            setupAutocomplete('movie1', 'dropdown1', 'movie_id_1');
            setupAutocomplete('movie2', 'dropdown2', 'movie_id_2');
            setupAutocomplete('movie3', 'dropdown3', 'movie_id_3');
        }

        // ========== CATÁLOGO DE PESQUISA ==========
        let activeGenre = null;

        function applyFilters() {
            const query = document.getElementById('catalogSearch').value.trim().toLowerCase();

            let filtered = moviesList;

            if (activeGenre) {
                filtered = filtered.filter(m =>
                    Array.isArray(m.genres) && m.genres.includes(activeGenre)
                );
            }

            if (query.length > 0) {
                filtered = filtered.filter(m =>
                    m.title.toLowerCase().includes(query)
                );
            }

            renderCatalogCards(filtered, query, activeGenre);
        }

        function renderCatalogCards(movies, query = '', genre = null) {
            const resultsContainer = document.getElementById('catalogResults');
            const statusEl = document.getElementById('catalogStatus');

            resultsContainer.innerHTML = '';

            if (movies.length === 0) {
                statusEl.textContent = '';
                resultsContainer.innerHTML = `
                    <div class="catalog-placeholder">
                        <span class="catalog-placeholder-icon">😕</span>
                        <p>Nenhum filme encontrado${genre ? ` em <strong>${genre}</strong>` : ''}${query ? ` para "<strong>${query}</strong>"` : ''}</p>
                    </div>`;
                return;
            }

            statusEl.textContent = `${movies.length} filme${movies.length !== 1 ? 's' : ''} encontrado${movies.length !== 1 ? 's' : ''}`;

            movies.forEach((movie, i) => {
                const poster = movie.poster_path
                    ? `https://image.tmdb.org/t/p/w185${movie.poster_path}`
                    : 'https://placehold.co/48x72/222/aaa?text=?&font=roboto';

                const card = document.createElement('div');
                card.className = 'catalog-card';
                card.style.animationDelay = `${Math.min(i * 10, 350)}ms`;
                card.innerHTML = `
                    <div class="catalog-card-poster-wrap">
                        <img
                            src="${poster}"
                            alt="${movie.title}"
                            onerror="this.src='https://placehold.co/48x72/222/aaa?text=?&font=roboto'"
                            class="catalog-card-poster"
                        >
                    </div>
                    <div class="catalog-card-info">
                        <span class="catalog-card-title">${movie.title}</span>
                        ${Array.isArray(movie.genres) && movie.genres.length ? `<span class="catalog-card-genres">${movie.genres.join(' · ')}</span>` : ''}
                    </div>
                `;
                resultsContainer.appendChild(card);
            });
        }

        function buildGenrePills() {
            const allGenres = [...new Set(moviesList.flatMap(m => m.genres || []))].sort();
            const wrapper = document.getElementById('genrePills');
            wrapper.innerHTML = '';

            // Pill "Todos"
            const allPill = document.createElement('button');
            allPill.className = 'genre-pill active';
            allPill.textContent = 'Todos';
            allPill.dataset.genre = '';
            wrapper.appendChild(allPill);

            allGenres.forEach(genre => {
                const pill = document.createElement('button');
                pill.className = 'genre-pill';
                pill.textContent = genre;
                pill.dataset.genre = genre;
                wrapper.appendChild(pill);
            });

            wrapper.addEventListener('click', function(e) {
                const pill = e.target.closest('.genre-pill');
                if (!pill) return;

                wrapper.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');

                activeGenre = pill.dataset.genre || null;
                applyFilters();
            });
        }

        function setupCatalogSearch() {
            const searchInput = document.getElementById('catalogSearch');
            const clearBtn = document.getElementById('catalogClearBtn');

            buildGenrePills();
            applyFilters();

            searchInput.addEventListener('input', function() {
                clearTimeout(catalogSearchTimeout);
                const query = this.value.trim();
                clearBtn.style.display = query.length > 0 ? 'flex' : 'none';
                catalogSearchTimeout = setTimeout(applyFilters, 220);
            });

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                applyFilters();
                searchInput.focus();
            });
        }
        // ========== FIM CATÁLOGO ==========

        document.getElementById('movieForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const inputs = document.querySelectorAll('input[name^="movie_id_"]');
            let isValid = true;
            
            inputs.forEach(input => {
                if (!input.value) {
                    isValid = false;
                    alert('Por favor, selecione todos os filmes da lista de sugestões!');
                }
            });

            if (!isValid) return;

            const formData = new FormData(this);
            
            try {
                const response = await fetch('/submit_ratings', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    document.getElementById('results').style.display = 'block';
                    
                    const grid = document.getElementById('moviesGrid');
                    grid.innerHTML = '';
                    
                    result.recommendations.forEach(movie => {
                        const card = document.createElement('div');
                        card.className = 'movie-card';
                        card.innerHTML = `
                            <img src="${movie.poster}" alt="${movie.title}" 
                                 onerror="this.src='https://via.placeholder.com/200x300?text=Sem+Poster'">
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-rating">⭐ ${movie.predicted_rating.toFixed(1)}</div>
                        `;
                        grid.appendChild(card);
                    });
                    
                    document.getElementById('results').scrollIntoView({
                        behavior: 'smooth'
                    });
                } else {
                    alert('Erro: ' + result.error);
                }
            } catch (error) {
                alert('Erro ao processar solicitação: ' + error.message);
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            loadMovies().then(() => {
                initAutocompletes();
                setupCatalogSearch();
            });
        });
    </script>
</body>
</html>
